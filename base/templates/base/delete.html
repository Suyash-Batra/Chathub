{% extends 'main.html' %}
{% block content %}

<div class="delete-page">
    <div class="delete-card">
        <div class="delete-card__header">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#da373c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            <h3>Confirm Deletion</h3>
        </div>

        <div class="delete-card__body">
            <p>Are you sure you want to delete <strong>"{{name}}"</strong>?</p>
            <p class="warning-text">This action cannot be undone.</p>
        </div>

        <form action="" method="POST" class="delete-form">
            {% csrf_token %}
            <div class="delete-actions">
                <a href="{{request.META.HTTP_REFERER}}" class="btn btn-cancel">Go Back</a>
                <button type="submit" class="btn btn-delete">Confirm Delete</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
